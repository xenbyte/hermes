networks:
  hermes-network-dev:
    name: hermes-network-dev

volumes:
  hermes-database-volume-dev:
    name: hermes-database-volume-dev

services:
  hermes-bot-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: hermes-bot-dev
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    healthcheck:
      test: cat /proc/1/cmdline || exit 1
      start_period: 5s
    image: xenbyte/hermes-bot:dev
    networks: 
      - hermes-network-dev
    restart: unless-stopped
    volumes:
      - ./data:/data
    working_dir: /bot/hermes

  hermes-scraper-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    container_name: hermes-scraper-dev
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    healthcheck:
      test: pgrep cron || exit 1
      start_period: 5s
    image: xenbyte/hermes-scraper:dev
    networks: 
      - hermes-network-dev
    restart: unless-stopped
    volumes:
      - ./data:/data
    working_dir: /scraper

  hermes-database-dev:
    container_name: hermes-database-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    image: postgres:16
    networks: 
      - hermes-network-dev
    ports:
      - "127.0.0.1:54321:5432"
    restart: unless-stopped 
    volumes:
      - hermes-database-volume-dev:/var/lib/postgresql/data

