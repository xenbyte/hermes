networks:
  hermes-network-dev:
    name: hermes-network-dev

volumes:
  hermes-database-volume-dev:
    name: hermes-database-volume-dev

services:
  hermes-bot-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: hermes-bot-dev
    healthcheck:
      test: cat /proc/1/cmdline || exit 1
      start_period: 5s
    image: xenbyte/hermes-bot:dev
    networks: 
      - hermes-network-dev
    restart: unless-stopped
    volumes:
      - ./data:/data
    working_dir: /bot/hermes

  hermes-scraper-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    container_name: hermes-scraper-dev
    healthcheck:
      test: pgrep cron || exit 1
      start_period: 5s
    image: xenbyte/hermes-scraper:dev
    networks: 
      - hermes-network-dev
    restart: unless-stopped
    volumes:
      - ./data:/data
    working_dir: /scraper

  hermes-analyzer-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.analyzer
    container_name: hermes-analyzer-dev
    healthcheck:
      test: pgrep cron || exit 1
      start_period: 5s
    image: xenbyte/hermes-analyzer:dev
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENRICHMENT_INTERVAL_HOURS=${ENRICHMENT_INTERVAL_HOURS:-4}
    networks: 
      - hermes-network-dev
    restart: unless-stopped
    volumes:
      - ./data:/data
    working_dir: /analyzer

  hermes-database-dev:
    container_name: hermes-database-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    image: postgres:16
    networks: 
      - hermes-network-dev
    ports:
      - "127.0.0.1:54321:5432"
    restart: unless-stopped 
    volumes:
      - hermes-database-volume-dev:/var/lib/postgresql/data

  hermes-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: hermes-web-dev
    image: xenbyte/hermes-web:dev
    networks:
      - hermes-network-dev
    ports:
      - "19191:5050"
    volumes:
      - ../web/local_testing:/app/local_testing:ro
    command:
      - gunicorn
      - --bind
      - 0.0.0.0:5050
      - --workers
      - "2"
      - --threads
      - "4"
      - --worker-class
      - gthread
      - --timeout
      - "60"
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
      - --log-level
      - info
      - --certfile
      - /app/local_testing/cert.pem
      - --keyfile
      - /app/local_testing/key.pem
      - hermes_web.app:app
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import ssl, urllib.request; c=ssl._create_unverified_context(); urllib.request.urlopen('https://localhost:5050/health', context=c).read()"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - BASE_URL=${BASE_URL}
      - LOG_FORMAT=${LOG_FORMAT:-plain}
