networks:
  hermes-network:
    name: hermes-network

volumes:
  hermes-database-volume:
    name: hermes-database-volume

services:
  hermes-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: hermes-bot
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: cat /proc/1/cmdline || exit 1
      start_period: 5s
    image: xenbyte/hermes-bot:latest
    networks: 
      - hermes-network
    restart: unless-stopped
    volumes:
      - ./data:/data
    working_dir: /bot/hermes

  hermes-scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    container_name: hermes-scraper
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: pgrep cron || exit 1
      start_period: 5s
    image: xenbyte/hermes-scraper:latest
    networks: 
      - hermes-network
    restart: unless-stopped
    volumes:
      - ./data:/data
    working_dir: /scraper

  hermes-database:
    container_name: hermes-database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    image: postgres:15
    environment:
      - POSTGRES_USER=hermes
      - POSTGRES_PASSWORD=hermes
      - POSTGRES_DB=hermes
    networks: 
      - hermes-network
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped 
    volumes:
      - hermes-database-volume:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
