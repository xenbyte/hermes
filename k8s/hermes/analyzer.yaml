apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-analyzer
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-analyzer
  template:
    metadata:
      labels:
        app: hermes-analyzer
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: analyzer
          image: ghcr.io/xenbyte/hermes-analyzer:latest
          imagePullPolicy: Always
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-env
                  key: ANTHROPIC_API_KEY
            - name: ENRICHMENT_INTERVAL_HOURS
              valueFrom:
                secretKeyRef:
                  name: hermes-env
                  key: ENRICHMENT_INTERVAL_HOURS
            - name: LOG_LEVEL
              valueFrom:
                secretKeyRef:
                  name: hermes-env
                  key: LOG_LEVEL
          volumeMounts:
            - name: secrets-py
              mountPath: /analyzer/hermes/hermes_utils/secrets.py
              subPath: secrets.py
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: secrets-py
          secret:
            secretName: hermes-secrets-py
        - name: data
          emptyDir: {}
