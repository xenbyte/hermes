apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-web
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-web
  template:
    metadata:
      labels:
        app: hermes-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/xenbyte/hermes-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5050
          envFrom:
            - secretRef:
                name: hermes-env
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5050
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-web
  namespace: hermes
spec:
  selector:
    app: hermes-web
  ports:
    - port: 80
      targetPort: 5050
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-web
  namespace: hermes
  annotations:
    ingressClassName: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hermes.xenbyte.dev
      secretName: hermes-web-tls
  rules:
    - host: hermes.xenbyte.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-web
                port:
                  number: 80
